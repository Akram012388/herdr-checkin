id = "Akram012388.checkin"
name = "Check-in"
version = "0.4.0"
# Core functionality and the terminal-native fallback support stock Herdr 0.7.5. Theme inheritance
# is capability-gated by HERDR_PLUGIN_PANE_THEME_JSON; its current producing build is the
# 0.7.5-akram.1 downstream candidate.
min_herdr_version = "0.7.5"
description = "Durable attention queue for agent panes: queue agents that go blocked or done, then jump to the oldest waiter on demand."
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]
platforms = ["linux", "macos"]

# Startup hook. Runs once per server process (cold start + live-handoff takeover). After a restart
# the event subscription starts fresh and misses panes already blocked/done, so this re-seeds the
# queue from a live `pane list`. Race-safe: it merges each waiter through the same per-pane upsert
# events use (a delta under the state lock), never a wholesale state.json rewrite.
[[startup]]
command = ["./target/release/herdr-checkin", "startup"]
platforms = ["linux", "macos"]

# Actions. Keybinds live in the user's herdr config (~/.config/herdr/config.toml),
# not here — bind Akram012388.checkin.next to prefix+alt+o there.
[[actions]]
id = "next"
title = "Check-in: next waiter"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-checkin", "next"]

[[actions]]
id = "peek"
title = "Check-in: peek queue"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-checkin", "peek"]

[[actions]]
id = "clear"
title = "Check-in: clear queue"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-checkin", "clear"]

# open-pane summons the status pane (below) as a centered popup via scripts/open-pane.sh. A popup
# is a session-level singleton, so no open/focus/close toggle is needed: the pane dismisses itself
# on q/Esc (it calls the popup.close socket method on exit).
[[actions]]
id = "open-pane"
title = "Check-in: open queue pane"
contexts = ["global", "workspace"]
command = ["/bin/sh", "scripts/open-pane.sh"]

# The status pane: a persistent TUI listing the live queue with select-and-jump. herdr spawns
# this long-running binary into the split; it re-reads state.json on a tick to stay current.
# A centered, session-modal popup (like herdr's own prefix+s settings). `width`/`height` are
# herdr's PopupSize; a "NN%" string is a percentage of the available area, so the modal scales to
# roughly half the screen like the settings popup (an integer would be a fixed cell count). The
# launcher passes the same values plus HERDR_CHECKIN_POPUP=1 so the pane dismisses its own popup
# on exit.
[[panes]]
id = "queue"
title = "Check-in"
placement = "popup"
width = "50%"
height = "50%"
command = ["./target/release/herdr-checkin", "pane"]

# Events. Enqueue on agent status changes; evict on focus and close.
[[events]]
on = "pane.agent_status_changed"
command = ["./target/release/herdr-checkin", "status-changed"]

[[events]]
on = "pane.focused"
command = ["./target/release/herdr-checkin", "focused"]

[[events]]
on = "pane.closed"
command = ["./target/release/herdr-checkin", "closed"]
